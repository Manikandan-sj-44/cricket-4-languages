name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2-SSH-KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2-HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to EC2
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_rsa" \
            ./ ${{ secrets.EC2-USER }}@${{ secrets.EC2-HOST }}:~/cricket-4-languages/
          
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2-USER }}@${{ secrets.EC2-HOST }} \
            "cd ~/cricket-4-languages && chmod +x deploy.sh && ./deploy.sh"
      
      - name: Health Check
        run: |
          sleep 10
          curl -f http://${{ secrets.EC2-HOST }}:7060/python/health || exit 1
          echo "✅ Deployment successful!"
